<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Speed</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div class="brand" aria-label="Video Speed logo">
        <img src="logo.svg" class="logo" alt="Video Speed logo">
      </div>

      <label for="maxRate">Max speed</label>
      <select id="maxRate">
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
      </select>

      <label for="rate">Speed <span id="rateValue">1x</span></label>
      <input id="rate" type="range" min="0.25" max="2" step="0.25" value="1">

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
