<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Speed</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div class="brand">
        <img src="logo.svg" class="logo" alt="Video Speed logo">
        <div class="brand-copy">
          <h1>Video Speed</h1>
          <p>Current tab</p>
        </div>
      </div>

      <section class="field">
        <label for="maxRate">Max speed</label>
        <div class="select-wrap">
          <select id="maxRate">
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
          </select>
        </div>
      </section>

      <section class="field">
        <div class="speed-row">
          <label for="rate">Speed</label>
          <output id="rateValue" for="rate">1x</output>
        </div>
        <input id="rate" type="range" min="0.25" max="2" step="0.25" value="1">
        <div class="slider-scale">
          <span>0.25x</span>
          <span id="maxRateHint">2x</span>
        </div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
